[build]
  command = "echo URL=$MY_SUPABASE_URL > .env && echo ANON=$ANON >> .env && echo VAPID_PUBLIC_KEY=$VAPID_PUBLIC_KEY >> .env && git clone https://github.com/flutter/flutter.git -b stable --depth 1 && ./flutter/bin/flutter build web --release"
  publish = "build/web"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
