name: kali_studio
description: Kali Studio - Pilates Class Booking App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.0
  flutter_staggered_grid_view: ^0.7.0
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7
  google_fonts: ^6.1.0
  intl: ^0.20.2
  supabase_flutter: ^2.12.0
  flutter_localizations:
    sdk: flutter
  csv: ^6.0.0
  file_saver: ^0.2.11
  url_launcher: ^6.3.0
  window_manager: ^0.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  assets:
    - .env
  uses-material-design: true
